name: release

# Publishes the standalone zot-warm CLI binaries to GitHub Releases on every
# semver tag. Intentionally separate from the container image build so the two
# release cadences can diverge: image builds run on every main push, binary
# releases only on tags.
#
# Artifacts uploaded per tag:
#   zot-warm-linux-amd64           — single binary, Intel/AMD 64-bit Linux
#   zot-warm-linux-arm64           — single binary, ARM 64-bit Linux
#   zot-warm-linux-universal.tar.gz — both binaries + selector script
#   SHA256SUMS                     — checksums covering all of the above
#
# The "universal" archive is a tar.gz containing both arch-specific binaries
# alongside a shell script that detects `uname -m` at install time and
# installs the matching binary. Consumers who know their arch can grab the
# single-arch binary directly; consumers who want one thing to curl grab
# the universal archive.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (for manual dispatch, e.g. v0.1.0)'
        required: true

permissions:
  contents: write  # required to create the release and upload assets

jobs:
  build:
    name: Build release binaries
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build linux/amd64
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: amd64
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w -X main.Version=${VERSION}" \
            -o dist/zot-warm-linux-amd64 \
            ./cmd/zot-warm

      - name: Build linux/arm64
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: arm64
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          go build \
            -trimpath \
            -ldflags="-s -w -X main.Version=${VERSION}" \
            -o dist/zot-warm-linux-arm64 \
            ./cmd/zot-warm

      - name: Assemble universal archive
        run: |
          mkdir -p universal/zot-warm
          cp dist/zot-warm-linux-amd64 universal/zot-warm/
          cp dist/zot-warm-linux-arm64 universal/zot-warm/
          cp scripts/zot-warm universal/zot-warm/
          cp scripts/install.sh universal/zot-warm/
          chmod +x universal/zot-warm/zot-warm
          chmod +x universal/zot-warm/install.sh
          tar -C universal -czf dist/zot-warm-linux-universal.tar.gz zot-warm

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: release-binaries
          path: dist/
          retention-days: 7

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v6
        with:
          name: release-binaries
          path: dist/

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: ${{ needs.build.outputs.version }}
          generate_release_notes: true
          files: |
            dist/zot-warm-linux-amd64
            dist/zot-warm-linux-arm64
            dist/zot-warm-linux-universal.tar.gz
            dist/SHA256SUMS
