name: build

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # Read the Go version directly from go.mod so the workflow tracks
          # whatever toolchain the module requires without a second place to
          # update. setup-go v6 respects both the `go` and `toolchain` lines.
          go-version-file: 'go.mod'

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Build zot-cache-warmer (sanity check, native arch)
        run: go build -v ./cmd/zot-cache-warmer

      - name: Build zot-warm (sanity check, native arch)
        run: go build -v ./cmd/zot-warm

  build-and-push:
    name: Build and push multi-arch image
    needs: test
    runs-on: ubuntu-latest
    # Only push images on main branch, tags, or manual dispatch. PRs get a
    # build-only validation from the test job above.
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Only log in to GHCR when running on GitHub (not Forgejo)
      - name: Log in to GitHub Container Registry
        if: github.server_url == 'https://github.com'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          # Only push to GHCR when running on GitHub (Forgejo does build-only validation)
          push: ${{ github.server_url == 'https://github.com' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true